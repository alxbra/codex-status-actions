name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    # The plugin and its privacy-preserving hook helper are macOS-only in v0.1.
    # Running CI on macOS exercises the same plutil/curl integration users install.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm licenses list --prod
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm validate
      - run: pnpm exec streamdeck pack --dry-run --no-update-check com.abrakazinga.codex-status-actions.sdPlugin

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run pack
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.streamDeckPlugin
